<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tutorial Telegram</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0b0d;
      --card: #141418;
      --card-2: #1b1b22;
      --pink-1: #72164a;
      --pink-2: #ff7ad1;
      --pink-3: #ff9be0;
      --text: #f5f5f7;
      --muted: #b6b6c0;
      --danger: #ff4f6e;
    }

    * {
      box-sizing: border-box;
      font-family: "Outfit" !important;
    }

    body {
      margin: 0;
      background-image:
        linear-gradient(180deg, rgba(11, 11, 13, 0.72), rgba(11, 11, 13, 0.58)),
        radial-gradient(1200px 600px at 20% -10%, rgba(255, 79, 179, 0.25), transparent 60%),
        radial-gradient(800px 500px at 90% 0%, rgba(255, 122, 209, 0.22), transparent 55%),
        radial-gradient(700px 700px at 50% 120%, rgba(255, 155, 224, 0.2), transparent 60%),
        url("96e8e80e-ba10-4b34-9eb0-52a511a7bd17.jpeg");
      background-color: var(--bg);
      background-repeat: no-repeat;
      background-position: center;
      background-size: auto, auto, auto, auto, cover;
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    .card {
      width: min(520px, 94vw);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--card), var(--card-2));
      border: 1px solid rgba(255, 122, 209, 0.18);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255, 122, 209, 0.08) inset;
      padding: 22px 22px 24px;
      position: relative;
      overflow: hidden;
    }

    .inner {
      position: relative;
      z-index: 1;
      background: rgba(14, 14, 18, 0.85);
      border-radius: 20px;
      padding: 20px;
      box-shadow: inset 0 0 0 1px rgba(255, 122, 209, 0.08);
    }

    .title {
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.08em;
      margin: 2px 0 16px;
      font-size: 15px;
      color: var(--pink-3);
    }

    .media {
      width: 100%;
      border-radius: 12px;
      background: #222;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
      border: 1px dashed rgba(255, 122, 209, 0.35);
    }

    .steps {
      margin: 16px 2px 12px;
      padding: 0;
      list-style: none;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .9rem;
    }

    .num {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 24px;
      height: 24px;
      border-radius: 100%;
      background: #ff4fb3;
      color: #fff;
      font-weight: 800;
    }

    .btn {
      margin-top: 12px;
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: #ff4fb3;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.05em;
      cursor: pointer;
      animation: pulseBtn 1.8s ease-in-out infinite;
    }

    @keyframes pulseBtn {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="inner">
      <div class="title">SIGA O TUTORIAL ABAIXO ⬇</div>

      <div class="media">
        <img style="max-width: 100%; border-radius: 12px;" src="tutorial.gif">
      </div>

      <ul class="steps">
        <li class="step-item"><span class="num">1</span> Toque nos Três pontinhos</li>
        <li class="step-item"><span class="num">2</span> Escolha "Abrir no navegador"</li>
      </ul>

      <button class="btn" id="telegramBtn"></button>
      <div class="status" id="statusText">Toque no botão para abrir o Telegram.</div>
    </div>
  </div>

  <script>
    (function () {
      var btn = document.getElementById("telegramBtn");
      var status = document.getElementById("statusText");
      var url = "https://t.me/thayssilva_bot"; // LINK ALTERADO
      var finished = false;
      var seconds = 5;
      var countdownTimer = null;

      function updateButtonText() {
        if (finished) return;
        btn.textContent = seconds > 0 ? "ABRIR TELEGRAM (" + seconds + ")" : "ABRIR TELEGRAM";
      }

      function goTelegram() {
        if (finished) return;
        finished = true;
        if (countdownTimer) clearInterval(countdownTimer);
        btn.textContent = "Abrindo...";
        status.textContent = "REDIRECIONANDO...";
        window.location.href = url;
      }

      function tick() {
        if (finished) return;
        updateButtonText();
        if (seconds <= 0) {
          goTelegram();
          return;
        }
        seconds -= 1;
      }

      btn.addEventListener("click", goTelegram);
      tick();
      countdownTimer = setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
